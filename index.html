<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>נעלי שני - חנות נעליים</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #6a1b9a; /* סגול בהשראת הלוגו */
            --light: #f4f4f4;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Assistant', sans-serif; }

        body { background-color: var(--white); color: var(--primary); }

        /* ניווט */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 5%; background: var(--white); box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky; top: 0; z-index: 1000;
        }

        .nav-links { display: flex; list-style: none; }
        .nav-links li { margin: 0 15px; cursor: pointer; font-weight: bold; }
        .nav-links li:hover { color: var(--accent); }

        /* מנוע חיפוש */
        .search-container { display: flex; align-items: center; background: #eee; padding: 5px 15px; border-radius: 20px; }
        .search-container input { border: none; background: none; outline: none; padding: 5px; }

        /* תוכן עמודים */
        .page { display: none; padding: 2rem 5%; min-height: 80vh; }
        .page.active { display: block; }

        /* דף הבית - גריד מוצרים */
        .products-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-top: 20px;
        }

        .product-card {
            border: 1px solid #ddd; padding: 15px; text-align: center; 
            border-radius: 10px; cursor: pointer; transition: 0.3s;
        }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .product-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 5px; }

        /* דף צור קשר - התמונה שלך */
        .contact-img { width: 100%; max-width: 600px; display: block; margin: 0 auto; border-radius: 15px; }
        .phone-link { display: block; text-align: center; font-size: 2rem; margin-top: 20px; text-decoration: none; color: black; font-weight: bold; }

        /* דף מוצר בודד */
        .single-product { text-align: center; }
        .single-product img { max-width: 400px; border-radius: 10px; }
        .back-btn { margin-bottom: 20px; cursor: pointer; color: var(--accent); font-weight: bold; display: inline-block; }

        footer { background: var(--primary); color: white; text-align: center; padding: 1.5rem; margin-top: 2rem; }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="showPage('home')" style="cursor:pointer; font-size: 1.5rem; font-weight: bold;">נעלי שני</div>
        <ul class="nav-links">
            <li onclick="showPage('home')">דף הבית</li>
            <li onclick="showPage('passover')">קולקציית פסח</li>
            <li onclick="showPage('contact')">צרו קשר</li>
        </ul>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="חיפוש דגם..." onkeyup="searchProducts()">
            <span>🔍</span>
        </div>
    </nav>

    <div id="home" class="page active">
        <h1>הדגמים שלנו</h1>
        <div class="products-grid" id="mainGrid">
            </div>
    </div>

    <div id="passover" class="page">
        <h1>קולקציית חג הפסח</h1>
        <p>מבחר נעליים אלגנטיות לחג לכל המשפחה</p>
        <div class="products-grid" id="passoverGrid">
            </div>
    </div>

    <div id="contact" class="page">
        <img src="https://i.ibb.co/v4m86mS/IMG-20260215-WA0010.jpg" class="contact-img" alt="נעלי שני צור קשר">
        <a href="tel:029972662" class="phone-link">📞 02-997-2662</a>
    </div>

    <div id="product-view" class="page">
        <div class="back-btn" onclick="showPage('home')">→ חזרה לכל הדגמים</div>
        <div id="product-content" class="single-product"></div>
    </div>

    <footer>
        <p>&copy; 2026 נעלי שני | שער בנימין מתחם עליון 103</p>
    </footer>

    <script>
        const products = [
            { id: 1, name: "סנדלי שורש", price: "₪299", img: "https://images.unsplash.com/photo-1603487788363-2a211e046ad2?w=400", desc: "סנדלי שורש מקוריים, עמידים לכל טיול." },
            { id: 2, name: "בלנסטון כאמל", price: "₪649", img: "https://images.unsplash.com/photo-1549298916-b41d501d3772?w=400", desc: "מגפי בלנסטון קלאסיים בצבע כאמל, נוחות ללא פשרות." },
            { id: 3, name: "נעלי חג לתינוקות", price: "₪149", img: "https://images.unsplash.com/photo-1519452635265-7b1fbfd1e4e0?w=400", desc: "נעלי צעד ראשון אלגנטיות ונוחות במיוחד לחג." },
            { id: 4, name: "נעלי בן ישי", price: "₪450", img: "https://images.unsplash.com/photo-1449241595196-485d289c02e1?w=400", desc: "נעלי נוחות איכותיות מבית בן ישי." },
            { id: 5, name: "נעלי חג פסח אלגנטיות", price: "₪380", img: "https://images.unsplash.com/photo-1533867617858-e7b97e060509?w=400", desc: "נעלי ערב יוקרתיות לגברים מקולקציית פסח.", isPassover: true }
        ];

        function renderProducts(filter = '') {
            const grid = document.getElementById('mainGrid');
            const passoverGrid = document.getElementById('passoverGrid');
            grid.innerHTML = '';
            passoverGrid.innerHTML = '';

            products.forEach(p => {
                if (p.name.includes(filter)) {
                    const card = `
                        <div class="product-card" onclick="openProduct(${p.id})">
                            <img src="${p.img}" alt="${p.name}">
                            <h3>${p.name}</h3>
                            <p>${p.price}</p>
                        </div>
                    `;
                    if (p.isPassover) passoverGrid.innerHTML += card;
                    grid.innerHTML += card;
                }
            });
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0,0);
        }

        function openProduct(id) {
            const p = products.find(prod => prod.id === id);
            const content = document.getElementById('product-content');
            content.innerHTML = `
                <img src="${p.img}">
                <h2>${p.name}</h2>
                <p style="font-size:1.5rem; color:var(--accent); font-weight:bold;">${p.price}</p>
                <p style="max-width:600px; margin: 20px auto;">${p.desc}</p>
                <button onclick="showPage('contact')" style="padding:10px 20px; background:black; color:white; border:none; border-radius:5px; cursor:pointer;">הזמן עכשיו בטלפון</button>
            `;
            showPage('product-view');
        }

        function searchProducts() {
            const term = document.getElementById('searchInput').value;
            renderProducts(term);
        }

        // טעינה ראשונית
        renderProducts();
    </script>
</body>
</html>
