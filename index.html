<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>נעלי שני | נעליים לכל המשפחה</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark: #121212;
            --gray: #f8f9fa;
            --white: #ffffff;
            --google-blue: #4285F4;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Assistant', sans-serif; }
        body { background-color: var(--gray); color: var(--dark); overflow-x: hidden; }

        header {
            background: var(--white);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 2000;
        }

        .logo-area { font-size: 2rem; font-weight: 800; color: var(--dark); cursor: pointer; }
        .logo-area span { color: var(--gold); }

        nav ul { display: flex; list-style: none; gap: 30px; }
        nav ul li { font-weight: 700; cursor: pointer; transition: var(--transition); font-size: 0.95rem; }
        nav ul li:hover { color: var(--gold); transform: translateY(-2px); }

        .search-bar {
            background: #eee;
            padding: 8px 15px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            width: 250px;
        }
        .search-bar input { border: none; background: transparent; outline: none; width: 100%; font-size: 0.9rem; padding-right: 10px; }

        .page { display: none; padding: 40px 8%; animation: fadeIn 0.6s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .hero { 
            height: 450px; 
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1549298916-b41d501d3772?q=80&w=2012&auto=format&fit=crop') center/cover; 
            border-radius: 20px; 
            margin-bottom: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .hero h1 { font-size: 3.5rem; margin-bottom: 10px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 35px;
        }

        .card {
            background: var(--white);
            border-radius: 15px;
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
            border: 1px solid #eaeaea;
        }
        .card:hover { transform: translateY(-12px); box-shadow: 0 25px 50px rgba(0,0,0,0.12); border-color: var(--gold); }
        .card img { width: 100%; height: 300px; object-fit: cover; }
        .card-info { padding: 20px; text-align: center; }
        .card-info .price { color: var(--gold); font-weight: 800; font-size: 1.2rem; }

        .contact-container { text-align: center; max-width: 800px; margin: 0 auto; }
        .contact-card-img { width: 100%; border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); margin-bottom: 30px; }
        
        .maps-btn {
            background-color: var(--google-blue);
            color: white;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(66, 133, 244, 0.4);
        }
        .maps-btn:hover { transform: scale(1.05); background-color: #3367D6; }

        .order-btn { background: var(--dark); color: white; padding: 15px 40px; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .order-btn:hover { background: var(--gold); }

        footer { text-align: center; padding: 40px; color: #888; border-top: 1px solid #eee; margin-top: 50px; }

        @media (max-width: 768px) {
            header { flex-direction: column; gap: 15px; }
            .search-bar { width: 100%; }
            .hero h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-area" onclick="showPage('home')">נעלי <span>שני</span></div>
    <nav>
        <ul>
            <li onclick="showPage('home')">דף הבית</li>
            <li onclick="showPage('passover')">קולקצייה</li>
            <li onclick="showPage('contact')">צרו קשר</li>
        </ul>
    </nav>
    <div class="search-bar">
        <input type="text" id="mainSearch" placeholder="חפש דגם..." oninput="filterItems()">
        <span>🔍</span>
    </div>
</header>

<main id="home" class="page active">
    <div class="hero">
        <h1>הקולקציה החדשה 2026</h1>
        <p>שער בנימין | מתחם עליון 103</p>
    </div>
    <div class="grid" id="homeGrid"></div>
</main>

<main id="passover" class="page">
    <div class="hero" style="background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://xsosshirts.co.il/media/source/n12_1.jpg') center/cover;">
        <h1>קולקציית חג חגיגית</h1>
        <p>נעלי חג אלגנטיות לכל המשפחה</p>
    </div>
    <div class="grid" id="passoverGrid"></div>
</main>

<main id="contact" class="page">
    <div class="contact-container">
        <img src="https://i.ibb.co/v4m86mS/IMG-20260215-WA0010.jpg" class="contact-card-img" alt="נעלי שני - שער בנימין">
        
        <div style="margin-bottom: 30px;">
            <p style="font-size: 1.2rem;">חייגו אלינו:</p>
            <a href="tel:029972662" style="text-decoration:none; color:var(--dark); font-size: 3rem; font-weight: 800;">02-997-2662</a>
        </div>

        <div>
            <a href="https://www.google.com/maps/search/?api=1&query=31.866083,35.260000" target="_blank" class="maps-btn">
                ניווט ב-Google Maps 📍
            </a>
            <p style="margin-top: 15px; color: #666;">מתחם עליון 103, שער בנימין</p>
        </div>
    </div>
</main>

<main id="productPage" class="page">
    <div onclick="showPage('home')" style="cursor:pointer; margin-bottom:20px; font-weight:700;">← חזרה לקטלוג</div>
    <div id="productDetailContent"></div>
</main>

<footer>
    <p>© 2026 נעלי שני - שער בנימין.</p>
</footer>

<script>
    const items = [
        { id: 1, name: "סנדלי שורש", price: "₪200", category: "all", img: "https://limeshoes.co.il/wp-content/uploads/2021/08/woman.jpg", desc: "סנדלי שורש מקוריים המשלבים נוחות ועמידות." },
        { id: 2, name: "בלנסטון כאמל", price: "₪250", category: "all", img: "https://d3m9l0v76dty0.cloudfront.net/system/photos/10403523/original/56bb9ed09e7d9b622fd3e2cd5846e514.jpg", desc: "מגפי בלנסטון קלאסיים בצבע כאמל." },
        { id: 3, name: "נעלי חג לתינוקות", price: "₪159", category: "passover", img: "https://encrypted-tbn3.gstatic.com/shopping?q=tbn:ANd9GcRSJ2pSW00ZpHGd5NP1RZ1TZ0QA9BMkBT7we2Pmpi7_eltzr19PD0PCKSzPJLS8uk1iasRf8DBzHccgYU8gdrJ6_O5YO0-gBZhL9zfXx93rrDTBOl-II-nkBWo5r2BTcIuiZ-uVDMM&usqp=CAc", desc: "נעלי חג אלגנטיות ורכות לקטנטנים." },
        { id: 4, name: "נעלי ספורט Hoka", price: "₪480", category: "all", img: "https://footlocker.co.il/cdn/shop/files/HOK252M-BWHT-1.jpg?v=1740645730&width=2400", desc: "נעלי ספורט מקצועיות ונוחות." },
        { id: 5, name: "נעלי הרים", price: "₪280", category: "all", img: "https://ertzcamping.co.il/images/itempics/8141_27112024154538_large.jpg", desc: "נעלי הרים איכותיות למסלולים." },
        { id: 6, name: "נעלי אלגנט גברים", price: "₪400", category: "passover", img: "https://xsosshirts.co.il/media/source/n12_1.jpg", desc: "נעלי עור יוקרתיות לשבתות וחגים." }
    ];

    function renderGrids(filterText = "") {
        const homeGrid = document.getElementById('homeGrid');
        const passoverGrid = document.getElementById('passoverGrid');
        if(!homeGrid || !passoverGrid) return;
        homeGrid.innerHTML = "";
        passoverGrid.innerHTML = "";
        items.forEach(item => {
            if (item.name.toLowerCase().includes(filterText.toLowerCase())) {
                const html = `
                    <div class="card" onclick="viewProduct(${item.id})">
                        <img src="${item.img}" alt="${item.name}">
                        <div class="card-info">
                            <h3>${item.name}</h3>
                            <p class="price">${item.price}</p>
                        </div>
                    </div>
                `;
                if (item.category === "passover") passoverGrid.innerHTML += html;
                homeGrid.innerHTML += html;
            }
        });
    }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function viewProduct(id) {
        const item = items.find(i => i.id === id);
        const container = document.getElementById('productDetailContent');
        container.innerHTML = `
            <div style="display:flex; gap:40px; background:white; padding:40px; border-radius:20px;">
                <img src="${item.img}" style="width:45%; border-radius:15px;">
                <div>
                    <h2>${item.name}</h2>
                    <p style="color:var(--gold); font-size:2rem; font-weight:800;">${item.price}</p>
                    <p style="margin:20px 0;">${item.desc}</p>
                    <button class="order-btn" onclick="showPage('contact')">להזמנה טלפונית</button>
                </div>
            </div>
        `;
        showPage('productPage');
    }

    function filterItems() {
        renderGrids(document.getElementById('mainSearch').value);
    }

    window.onload = () => renderGrids();
</script>
</body>
</html>
